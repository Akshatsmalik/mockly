version: "3.9"


services:
  backend:
    build:
      context: ./backend
    container_name: backend
    ports:
      - "8000:8000"
    restart: always
    env_file:
    - .env


  frontend:
    build:
      context: ./hr-frontend
    container_name: frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: always